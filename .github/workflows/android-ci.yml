name: Android CI

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master
  workflow_dispatch:
    inputs:
      branch:
        description: Branch to run CI against
        required: false
        default: master
        type: string

concurrency:
  group: android-ci-${{ github.event.pull_request.number || github.ref || inputs.branch || github.run_id }}
  cancel-in-progress: true

jobs:
  android-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.branch || github.sha }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Appium
        run: |
          npm install -g appium@2
          appium driver install uiautomator2

      - name: Run Android tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          target: google_apis
          arch: x86_64
          profile: pixel_5
          disable-animations: true
          script: |
            set -euo pipefail
            APPIUM_LOG="$GITHUB_WORKSPACE/appium.log"
            appium --address 127.0.0.1 --port 4723 --log-level error > "$APPIUM_LOG" 2>&1 &
            APPIUM_PID=$!
            trap 'kill $APPIUM_PID || true' EXIT

            until curl -sf http://127.0.0.1:4723/status >/dev/null; do
              sleep 2
            done

            npm test

      - name: Upload Appium log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: appium-log
          path: appium.log
          if-no-files-found: ignore
